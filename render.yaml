services:
  - type: web
    name: adanma-engineering
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/*.html"
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /sitemap.xml
        name: Content-Type
        value: application/xml; charset=utf-8
      - path: /robots.txt
        name: Content-Type
        value: text/plain; charset=utf-8
    routes:
      - type: rewrite
        source: /sitemap.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /robots.txt
        destination: /robots.txt
      - type: rewrite
        source: /*.html
        destination: /*.html
      - type: rewrite
        source: /assets/*
        destination: /assets/*
      - type: rewrite
        source: /*
        destination: /index.html
